# HTTPS Server Block
server {
    listen 443 ssl;
    listen 80;
    server_name cemcedimoglu.me;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/cemcedimoglu.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cemcedimoglu.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ============== GÜVENLİK HEADERS ==============
    # Clickjacking koruması
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # XSS koruması
    add_header X-XSS-Protection "1; mode=block" always;
    
    # MIME sniffing koruması
    add_header X-Content-Type-Options "nosniff" always;
    
    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # HSTS (HTTP Strict Transport Security) - 1 yıl
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # ============================================

    # Frontend - React build dosyaları
    root /home/xserio/e_ticaret_projesi/frontend/dist;
    index index.html;

    # Gzip sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Server version gizle
    server_tokens off;

    # Favicon
    location = /favicon.ico {
        try_files $uri /favicon.svg =204;
        log_not_found off;
        access_log off;
    }

    # API isteklerini Django backend'e yönlendir
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Request body boyutu limiti (dosya upload için)
        client_max_body_size 50M;
    }

    # Admin paneli
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Request body boyutu limiti (dosya upload için)
        client_max_body_size 50M;
    }

    # Django static files (admin panel için)
    location /static/ {
        alias /home/xserio/e_ticaret_projesi/backend/staticfiles/;
    }

    # GitHub Webhook
    location /webhook {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Media dosyaları
    location ^~ /media/ {
        alias /home/xserio/e_ticaret_projesi/backend/media_files/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router için
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Localhost için (development)
server {
    listen 80;
    server_name localhost;

    root /home/xserio/e_ticaret_projesi/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /static/ {
        alias /home/xserio/e_ticaret_projesi/backend/staticfiles/;
    }

    location ^~ /media/ {
        alias /home/xserio/e_ticaret_projesi/backend/media_files/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
