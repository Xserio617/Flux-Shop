server {
    listen 80;
    server_name localhost cemcedimoglu.me www.cemcedimoglu.me;

    # Frontend - React build dosyaları
    root /home/xserio/e_ticaret_projesi/frontend/dist;
    index index.html;

    # Gzip sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Favicon - 404 hatasını önle
    location = /favicon.ico {
        try_files $uri /favicon.svg =204;
        log_not_found off;
        access_log off;
    }

    # API isteklerini Django backend'e yönlendir
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin paneli
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # GitHub Webhook
    location /webhook {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Media dosyaları - ^~ ile regex'ten öncelikli
    location ^~ /media/ {
        alias /home/xserio/e_ticaret_projesi/backend/media_files/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router için - tüm istekleri index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }
}
